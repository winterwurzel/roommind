name: Mutation Testing

on:
  workflow_dispatch:

jobs:
  mutation-test:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install "mutmut>=3.5"

      - name: Restore mutmut cache
        uses: actions/cache@v5
        with:
          path: mutants/
          key: mutmut-${{ hashFiles('custom_components/**/*.py') }}
          restore-keys: |
            mutmut-

      - name: Run mutation testing
        run: |
          mutmut run || EXIT=$?
          if [ "${EXIT:-0}" -ge 2 ]; then
            echo "::error::mutmut failed with exit code $EXIT"
            exit $EXIT
          fi

      - name: Post summary
        if: always()
        run: |
          # Parse the last progress line from the run log for overall stats
          # Format: ⠴ 12408/12408  🎉 8107 🫥 26  ⏰ 1754  🤔 0  🙁 2521  🔇 0  🧙 0
          mutmut results --all > /tmp/mutmut-all.txt 2>&1 || true
          mutmut results > /tmp/mutmut-survived.txt 2>&1 || true

          TOTAL=$(wc -l < /tmp/mutmut-all.txt | tr -d ' ')
          SURVIVED=$(grep -c "survived" /tmp/mutmut-survived.txt 2>/dev/null || echo "0")
          TIMEOUT=$(grep -c "timeout" /tmp/mutmut-all.txt 2>/dev/null || echo "0")
          NO_TESTS=$(grep -c "no tests" /tmp/mutmut-all.txt 2>/dev/null || echo "0")
          KILLED=$((TOTAL - SURVIVED - TIMEOUT - NO_TESTS))
          if [ "$TOTAL" -gt 0 ]; then
            KILL_RATE=$((KILLED * 100 / TOTAL))
          else
            KILL_RATE=0
          fi

          echo "## Mutation Testing Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count | % |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------:|--:|" >> $GITHUB_STEP_SUMMARY
          echo "| Killed | $KILLED | ${KILL_RATE}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Survived | $SURVIVED | |" >> $GITHUB_STEP_SUMMARY
          echo "| Timeout | $TIMEOUT | |" >> $GITHUB_STEP_SUMMARY
          echo "| No tests | $NO_TESTS | |" >> $GITHUB_STEP_SUMMARY
          echo "| **Total** | **$TOTAL** | |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Survived mutants grouped by file
          echo "### Survived by file" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep "survived" /tmp/mutmut-survived.txt 2>/dev/null \
            | sed 's/:.*//' \
            | sed 's/\.x[ǁ_].*//; s/\.x__.*//; s/\.x_/\./' \
            | sort | uniq -c | sort -rn >> $GITHUB_STEP_SUMMARY || echo "  (none)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Generate artifact
        if: always()
        run: |
          mutmut results > mutation-report.txt 2>&1 || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-report
          path: mutation-report.txt
          retention-days: 30
