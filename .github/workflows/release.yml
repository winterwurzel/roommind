name: Release

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    name: Build and upload release asset
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Create release zip
        run: cd custom_components/roommind && zip -r ../../roommind.zip . -x "__pycache__/*"

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" roommind.zip --clobber
